name: Publish Steam crate

on:
  push:
    branches:
      - main
    paths:
      - 'packages/adapters-steam/src-tauri/**'
  workflow_dispatch: {}

jobs:
  publish:
    name: cargo publish overworld-steam
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Linux dependencies (Tauri build requirements)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Check whether this version is already published
        id: version-check
        working-directory: packages/adapters-steam/src-tauri
        run: |
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H 'User-Agent: overworld-steam-ci (https://github.com/luzhenqian/overworld)' \
            "https://crates.io/api/v1/crates/overworld-steam/$CRATE_VERSION")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_STATUS" = "404" ]; then
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected HTTP status $HTTP_STATUS from crates.io API" >&2
            exit 1
          fi

      - name: Publish to crates.io
        if: steps.version-check.outputs.already_published == 'false'
        working-directory: packages/adapters-steam/src-tauri
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
