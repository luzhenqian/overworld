# Native build & artifact CI for the Overworld multi-platform templates (v1.3).
#
# Produces REAL, downloadable artifacts for the desktop (Tauri) and mobile
# (Capacitor) templates. Runs on manual dispatch and on version tag pushes.
#
# NOTE: End-to-end tests in CI (Playwright driving the web templates) are a
# deliberate follow-up and are intentionally NOT part of this workflow.
#
# Everything built here is UNSIGNED:
#   - macOS / Windows Tauri bundles are not codesigned or notarized.
#   - Android is a debug-signed APK (auto-generated debug keystore, not a
#     release key).
#   - iOS is a simulator build with code signing disabled.
# Signing / notarization requires repository secrets (Apple Developer ID +
# notarization creds, a Windows code-signing cert, an Android release keystore)
# and hardware, so it is intentionally out of scope here.

name: Build Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Do not cancel in-progress artifact builds — a half-produced release set is
  # worse than waiting for the previous run to finish.
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  desktop:
    name: Desktop (Tauri) — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @overworld packages
        run: pnpm -r --filter './packages/*' build

      - name: Build desktop-tauri web bundle
        run: pnpm --filter desktop-tauri build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # src-tauri/target is not committed, so the Rust build starts from
      # scratch. Cache the Cargo registry + target dir to speed up reruns.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/desktop-tauri/src-tauri

      # UNSIGNED build. Signing needs secrets that are intentionally not wired
      # up here: an Apple Developer ID cert + notarization credentials on macOS,
      # and a code-signing certificate on Windows. The bundles are still fully
      # installable, just flagged as unidentified by Gatekeeper / SmartScreen.
      - name: Build Tauri bundles (unsigned)
        run: pnpm --filter desktop-tauri tauri:build

      - name: Upload macOS bundles
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          if-no-files-found: error
          path: |
            examples/desktop-tauri/src-tauri/target/release/bundle/dmg/*.dmg
            examples/desktop-tauri/src-tauri/target/release/bundle/macos/*.app

      - name: Upload Windows bundles
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          if-no-files-found: error
          path: |
            examples/desktop-tauri/src-tauri/target/release/bundle/msi/*.msi
            examples/desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe

  android:
    name: Android (Capacitor) — debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @overworld packages
        run: pnpm -r --filter './packages/*' build

      - name: Build mobile-capacitor web bundle
        run: pnpm --filter mobile-capacitor build

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # The native android/ project is generated by Capacitor and not committed,
      # so it is created fresh here, then the web assets are synced into it.
      - name: Add & sync Android platform
        run: |
          pnpm --filter mobile-capacitor exec cap add android
          pnpm --filter mobile-capacitor exec cap sync android

      # assembleDebug produces a debug-signed APK using the auto-generated debug
      # keystore — no release keystore or secrets required.
      - name: Assemble debug APK
        working-directory: examples/mobile-capacitor/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          if-no-files-found: error
          path: examples/mobile-capacitor/android/app/build/outputs/apk/debug/*.apk

  ios:
    name: iOS (Capacitor) — simulator build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @overworld packages
        run: pnpm -r --filter './packages/*' build

      - name: Build mobile-capacitor web bundle
        run: pnpm --filter mobile-capacitor build

      # The native ios/ project is generated by Capacitor and not committed, so
      # it is created fresh here; `cap sync` runs `pod install` under the hood.
      - name: Add & sync iOS platform
        run: |
          pnpm --filter mobile-capacitor exec cap add ios
          pnpm --filter mobile-capacitor exec cap sync ios

      # Capacitor always scaffolds ios/App/App.xcworkspace with an `App` scheme.
      # The appName "Overworld" in capacitor.config.ts only sets the display
      # name (CFBundleDisplayName), not the Xcode project/scheme name. A
      # simulator build with CODE_SIGNING_ALLOWED=NO needs no Apple certs.
      - name: Build iOS app (simulator, unsigned)
        working-directory: examples/mobile-capacitor
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          if-no-files-found: error
          path: examples/mobile-capacitor/build/Build/Products/Debug-iphonesimulator/App.app
